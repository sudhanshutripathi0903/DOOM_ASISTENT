<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AATOS AI - Orbital Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --neon-cyan: #00f0ff;
            --neon-purple: #a855f7;
            --deep-space: #050508;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--deep-space);
            color: #e2e8f0;
            font-family: 'Rajdhani', sans-serif;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .scanlines::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0, 240, 255, 0.015) 2px, rgba(0, 240, 255, 0.015) 4px);
            z-index: 9999;
            pointer-events: none;
        }

        .space-bg-css {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
            background: radial-gradient(circle at center, #0c1020 0%, #050508 100%);
            background-image: 
                radial-gradient(white, rgba(255,255,255,.2) 2px, transparent 40px),
                radial-gradient(white, rgba(255,255,255,.15) 1px, transparent 30px);
            background-size: 550px 550px, 350px 350px;
            animation: cosmicPan 60s linear infinite;
            opacity: 0.3;
        }

        @keyframes cosmicPan {
            from { background-position: 0 0, 40px 60px; }
            to { background-position: 550px 1100px, 390px 760px; }
        }

        .glass-panel {
            background: rgba(10, 10, 18, 0.75);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 240, 255, 0.12);
        }

        .holo-card {
            background: linear-gradient(135deg, rgba(0, 240, 255, 0.03), rgba(168, 85, 247, 0.03));
            border: 1px solid rgba(0, 240, 255, 0.15);
            backdrop-filter: blur(10px);
        }

        .orbital-ring {
            position: absolute;
            border: 1px solid rgba(0, 240, 255, 0.08);
            border-radius: 50%;
            animation: orbitSpin linear infinite;
        }
        @keyframes orbitSpin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: #22c55e;
            box-shadow: 0 0 10px #22c55e;
        }

        .slide-out {
            transform: translateX(100vw);
            opacity: 0;
            pointer-events: none;
        }

        /* ✨ EXTREME GEMINI BLUR-SLIDE TRANSITION FOR HERO TEXT */
        #hero-view {
            transition: transform 0.8s cubic-bezier(0.25, 1, 0.5, 1), filter 0.6s ease, opacity 0.5s ease;
            will-change: transform, filter;
        }
        
        /* Box par touch/focus karte hi ye class trigger hogi */
        .hero-shifted {
            transform: translateY(-32vh) scale(0.8);
            filter: blur(4px);
            opacity: 0.8;
        }
    </style>
</head>
<body class="scanlines">

    <div class="space-bg-css"></div>

    <div id="lock-screen" class="fixed inset-0 z-[100] flex items-center justify-center bg-[#050508]/98 backdrop-blur-3xl transition-all duration-700 ease-in-out">
        <div class="text-center p-8 rounded-2xl border border-cyan-500/20 bg-[#0a0a12] max-w-sm w-full mx-4 shadow-2xl flex flex-col items-center justify-center">
            <h2 class="font-orbitron text-xl font-bold tracking-widest text-white mb-2">AATOS CORE LOCK</h2>
            <p class="text-xs font-mono text-cyan-400/60 uppercase tracking-widest mb-6">Enter Authorization Token</p>
            <div class="flex items-center justify-between gap-2 border border-cyan-400/30 rounded-xl px-4 py-2 bg-black/40 w-full max-w-[260px]">
                <input 
                    type="password" 
                    id="pin-input"
                    maxLength="4"
                    placeholder="••••" 
                    style="background: transparent; border: none; color: #00f0ff; text-align: center; outline: none;"
                    class="w-full font-mono text-2xl tracking-[0.5em]"
                />
                <button onclick="verifyPin()" class="p-1 text-cyan-400 hover:text-white transition-colors">
                    <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div class="relative z-10 h-screen w-full max-w-2xl mx-auto flex flex-col justify-between items-center px-4 py-6">
        
        <header class="glass-panel border border-cyan-500/10 rounded-2xl w-full px-6 py-4 flex items-center justify-between shadow-xl flex-shrink-0">
            <h1 class="font-orbitron text-xl font-bold tracking-wider text-white">AATOS<span class="text-cyan-400">AI</span></h1>
            <div class="flex items-center gap-2 px-3 py-1 rounded-full border border-cyan-500/20 bg-cyan-500/5">
                <div class="status-dot"></div>
                <span class="text-xs font-mono text-cyan-400/80">SERVER ONLINE</span>
            </div>
        </header>

        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-0 overflow-hidden">
            <div class="orbital-ring w-[280px] h-[280px]" style="animation-duration: 25s;"></div>
            <div class="orbital-ring w-[500px] h-[500px] border-purple-400/10" style="animation-duration: 40s; animation-direction: reverse;"></div>
        </div>

        <div class="w-full flex-1 flex flex-col justify-center items-center my-auto relative">
            
            <div id="hero-view" class="text-center flex flex-col items-center justify-center absolute top-[38%] transform -translate-y-1/2 z-10">
                <h1 class="font-orbitron text-4xl md:text-5xl font-black text-white mb-3 tracking-tight">
                    AATOS <span class="text-transparent bg-clip-text bg-gradient-to-r from-cyan-400 via-purple-400 to-pink-400">INTELLIGENCE</span>
                </h1>
                <p id="sub-title" class="text-gray-400 text-xs max-w-sm font-rajdhani tracking-wide uppercase">
                    SYSTEM SECURITY ENCRYPTED // CORE TERMINAL v2.6 ACTIVE
                </p>
            </div>

            <div id="chat-box" class="w-full overflow-y-auto space-y-4 h-[52vh] max-h-[52vh] mb-6 hidden z-10 pr-1 mt-16">
                </div>

            <div class="w-full max-w-xl z-20 absolute bottom-[25%] transition-all duration-700" id="input-wrapper">
                <div class="glass-panel border border-cyan-500/20 rounded-2xl p-2.5 shadow-2xl">
                    <div class="flex items-center gap-2">
                        <input 
                            type="text" 
                            id="cmd-input"
                            onfocus="startChatTransition()"
                            placeholder="Ask anything about cosmos or code..." 
                            class="flex-1 bg-transparent border-none text-sm text-gray-200 placeholder-gray-600 focus:outline-none outline-none px-2 py-1.5"
                        />
                        <button onclick="executeCommand()" class="p-2.5 rounded-xl bg-gradient-to-r from-cyan-500 to-purple-500 hover:from-cyan-400 hover:to-purple-400 transition-all flex-shrink-0">
                            <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"/></svg>
                        </button>
                    </div>
                </div>
            </div>

        </div>

        <footer class="text-[10px] font-mono text-gray-600 mt-2 flex-shrink-0">
            AATOS AI MATRIX PROTOCOL v2.6
        </footer>
    </div>

    <script>
        const lockScreen = document.getElementById('lock-screen');
        const pinInput = document.getElementById('pin-input');
        const heroView = document.getElementById('hero-view');
        const chatBox = document.getElementById('chat-box');
        const cmdInput = document.getElementById('cmd-input');
        const subTitle = document.getElementById('sub-title');
        const inputWrapper = document.getElementById('input-wrapper');

        let isChatStarted = false;

        function verifyPin() {
            if (pinInput.value === "2005") {
                lockScreen.classList.add('slide-out');
            } else {
                alert("❌ ACCESS DENIED: ENCRYPTION KEY MISMATCH");
                pinInput.value = '';
            }
        }

        pinInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') verifyPin();
        });

        // 🔥 CRITICAL CLICK/FOCUS EVENT TRANSITION (GEMINI STYLE)
        function startChatTransition() {
            if (isChatStarted) return;
            isChatStarted = true;

            // 1. Smoothly blur and slide up the title heading
            heroView.classList.add('hero-shifted');
            subTitle.style.opacity = '0'; // Fade out subtitle smoothly

            // 2. Anchor input wrapper to the exact bottom layout track
            inputWrapper.style.bottom = '0px';

            // 3. Open chat block area underneath right after transform
            setTimeout(() => {
                chatBox.style.display = 'block';
                // Trigger standard greetings from AATOS Core
                appendMessage('ai', 'Greetings, Commander. I am AATOS, your orbital intelligence core. Systems are fully responsive and under your direct command.');
            }, 300);
        }

        async function executeCommand() {
            const text = cmdInput.value.trim();
            if (!text) return;

            // Fallback check if user hit enter without clicking input directly
            if (!isChatStarted) startChatTransition();

            appendMessage('user', text);
            cmdInput.value = '';

            const loaderId = appendMessage('ai', 'AATOS IS SYNTHESIZING...');

            try {
                const response = await fetch('https://open-claw-backend.onrender.com/api/execute', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: text, token: "2005" })
                });
                const data = await response.json();
                
                let systemReply = data.feedback || data.error;
                
                systemReply = systemReply.replace(/Proxy-Mote Agent Terminal's core intelligence/gi, "AATOS");
                systemReply = systemReply.replace(/Proxy-Mote/gi, "AATOS");
                systemReply = systemReply.replace(/HUMAN_BOSS/gi, "Commander");
                systemReply = systemReply.replace(/Human Boss/gi, "Commander");
                
                document.getElementById(loaderId).innerText = systemReply;
            } catch (err) {
                document.getElementById(loaderId).innerText = `System Core Error: ${err.message}`;
            }
            
            chatBox.scrollTop = chatBox.scrollHeight;
        }

        cmdInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') executeCommand();
        });

        function appendMessage(type, content) {
            const id = 'msg-' + Math.random().toString(36).substr(2, 9);
            const wrapper = document.createElement('div');
            wrapper.className = `w-full flex ${type === 'user' ? 'justify-end' : 'justify-start'}`;
            
            const card = document.createElement('div');
            card.className = `holo-card rounded-xl p-4 max-w-[85%] text-sm md:text-base ${type === 'user' ? 'border-r-4 border-r-cyan-400 bg-cyan-500/5' : 'border-l-4 border-l-purple-500 bg-purple-500/5'}`;
            
            const text = document.createElement('p');
            text.id = id;
            text.className = 'text-gray-200 font-rajdhani leading-relaxed whitespace-pre-line';
            text.innerText = content;

            card.appendChild(text);
            wrapper.appendChild(card);
            chatBox.appendChild(wrapper);
            chatBox.scrollTop = chatBox.scrollHeight;

            return id;
        }
    </script>
</body>
</html>
